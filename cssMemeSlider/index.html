<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="media.css">
    <title>memSlider</title>
</head>
<body>
<div class="main-wrapper">
    <div class="slider-wrapper">
        <div class="wrapper">
            <div class="slider">
                <div class="slider-items">
                    <input type="radio" name="slide" id="slider-1" class="slide-radio1" checked>
                    <input type="radio" name="slide" id="slider-2" class="slide-radio2">
                    <input type="radio" name="slide" id="slider-3" class="slide-radio3">
                    <input type="radio" name="slide" id="slider-4" class="slide-radio4">
                    <div class="item slider-1">
                        <img src="./img/1.jpg" alt="first-img">
                    </div>
                    <div class="item">
                        <img src="./img/5.jpg" alt="second-img">
                    </div>
                    <div class="item">
                        <img src="./img/6.jpg" alt="third-imf">
                    </div>
                    <div class="item">
                        <img src="./img/2.jpg" alt="fourth-img">
                    </div>
                    <div class="slider slide1">
                        <h4 class="text">What do we have here?</h4>
                    </div>
                    <div class="slider slide2">
                        <h4 class="text">When the code doesn't work...</h4>
                    </div>
                    <div class="slider slide3">
                        <h4 class="text">Any ideas on how to fix this...</h4>
                    </div>
                    <div class="slider slide4">
                        <h4 class="text">When Ctrl+C/Ctrl+V doesn't help.....</h4>
                    </div>
                </div>
            </div>
            <div class="slider-nav">
                <label class="slider-nav-item first" for="slider-1"></label>
                <label class="slider-nav-item second" for="slider-2"></label>
                <label class="slider-nav-item" for="slider-3"></label>
                <label class="slider-nav-item" for="slider-4"></label>
            </div>
        </div>
    </div>
</div>
</body>
</html>
