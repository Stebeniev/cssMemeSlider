<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="media.css">
    <title>memSlider</title>
</head>
<body>
<div class="main-wrapper">
    <div class="slider-wrapper">
        <div class="wrapper">
            <div class="slider">
                <div class="slider-items">
                    <input type="radio" name="slide" id="slider-1">
                    <input type="radio" name="slide" id="slider-2">
                    <input type="radio" name="slide" id="slider-3">
                    <input type="radio" name="slide" id="slider-4">
                    <div class="item slider-1">
                        <img src="./img/1.jpg" alt="first-img">
                    </div>
                    <div class="item">
                        <img src="./img/5.jpg" alt="second-img">
                    </div>
                    <div class="item">
                        <img src="./img/6.jpg" alt="third-imf">
                    </div>
                    <div class="item">
                        <img src="./img/2.jpg" alt="fourth-img">
                    </div>
                </div>
            </div>
                <div class="slider-nav">
                    <label class="slider-nav-item first" for="slider-1"></label>
                    <label class="slider-nav-item" for="slider-2"></label>
                    <label class="slider-nav-item" for="slider-3"></label>
                    <label class="slider-nav-item" for="slider-4"></label>
                </div>

        </div>
    </div>
</div>


</body>
</html>
